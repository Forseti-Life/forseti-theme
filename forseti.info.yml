name: Forseti
description: "AI-powered community safety platform for Philadelphia - Building a safer tomorrow through intelligent monitoring and community engagement"
screenshot: screenshot.png
logo: images/logos/forseti_navbar.png
'alt text': 'Forseti Safety Community Platform'
core_version_requirement: ^10.3 || ^11
# version: '1.0'
engine: twig
type: theme
base theme: radix
starterkit: true

'interface translation project': forseti
'interface translation server pattern': 'themes/custom/forseti/translations/%language.po'

regions:
  navbar_branding: Navbar branding
  navbar_left: Navbar left
  navbar_right: Navbar right
  header: Header
  breadcrumb: Breadcrumb
  tabs: Tabs
  content: Content
  page_bottom: Page bottom
  footer: Footer

libraries:
  - forseti/style

ckeditor5-stylesheets:
  - build/css/main.style.css

libraries-extend:
  core/drupal.ajax:
    - forseti/drupal.ajax
  core/drupal.checkbox:
    - forseti/drupal.checkbox
  # core/drupal.dialog:
  #   - forseti/drupal.dialog
  # core/drupal.dialog.ajax:
  #   - forseti/drupal.dialog.ajax
  core/drupal.message:
    - forseti/drupal.message
  core/drupal.progress:
    - forseti/drupal.progress
  clientside_validation_jquery/cv.jquery.validate:
    - forseti/jquery.validate

# Information added by Drupal.org packaging script on 2025-05-08
version: '6.0.2'
project: 'radix'
datestamp: 1746711574
